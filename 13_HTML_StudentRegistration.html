<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>

    <h2><mark><i>Student Registration Form</i></mark></h2>
    <form action="#" method="post">
        
        <lable for="name">Name:</lable>
        <input type="text" name="Name" required placeholder="Enter Student Name"><br><br>

        <lable for="name">Father's Name:</lable>
        <input type="text" name="Name" required placeholder="Enter Father's Name"><br><br>
        
        <lable for="name">Mother's Name:</lable>
        <input type="text" name="Name" required placeholder="Enter Mother's Name"><br><br>

         <lable for="tel">Mobile:</lable>
        <input type="tel" name="Mobile" required placeholder="Enter Mobile Number"><br><br>

        <lable for="email">Email:</lable>
        <input type="email" name="email" required placeholder="Enter your Email"><br><br>

        <lable for="password">Password:</lable>
        <input type="password" name="password" required placeholder="Enter your Password"><br><br>

        <label for="gender"> Gender:</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <br><br>

        <lable for="date" > Date Of Birth:</lable>
        <input type="date" name="Date Of Birth" required placeholder="Enter date Of Birth"><br><br> 

        <lable for="course"> Course:</lable>
        <select>
               <option>Computer Engineering</option>
                <option>Information Technology</option>
                <option>Mechanical Engineering</option>
                <option>Civil Engineering</option>
                <option>Electrical Engineering</option>
        </select>
        <br><br>

        <lable for="Address">Address:</lable><br>
        <textarea  name="Address" rows="5" cols="25" placeholder="Enter Your Address"></textarea>
        <br><br>

        <lable for="Hobbies">Hobbies:</lable>
        <input type="checkbox">Reading
        <input type="checkbox">Sports
        <input type="checkbox">Music
        <br><br>

       <lable for="Upload Photo">Upload Photo</lable>:
       <input type="file" name="Upload Photo" required placeholder="Choose File" >
       <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    
</body>
</html>
