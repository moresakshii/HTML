<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h2><mark><u>Registration Form</u></mark></h2>
    <form action="#" method="post">

        <lable for="name">Name:</lable>
        <input type="text" name="Name" required placeholder="Enter your Name"><br><br>
        
       <lable for="email">Email:</lable>
        <input type="email" name="email" required placeholder="Enter your Email"><br><br>

        <lable for="tel">Mobile:</lable>
        <input type="tel" name="Mobile" required placeholder="Enter Mobile Number"><br><br>

        <lable for="password">Password:</lable>
        <input type="password" name="password" required placeholder="Enter your Password"><br><br>

        <lable for="password">Confirm Password:</lable>
        <input type="password" name="confirm password" required placeholder="Confirm Password"><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">


    
</body>
</html>
