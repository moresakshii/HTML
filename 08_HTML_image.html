<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tag</title>
</head>
<body>
    <!--Relative Path Image-->
    <h1>TCS Company </h1>
    <img src="/image/TCS.jpg" alt="TCS company" width="300" height="300">

    <!--Absolute Path Image-->
    <h1>Infosys Company </h1>
    <img src="https://i.ytimg.com/vi/3UgW7RI-QeY/maxresdefault.jpg" alt="Infosys company" width="300" height="300">
    
</body>
</html>
